services:
  dockerproxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: villanelle-dockerproxy
    restart: unless-stopped
    environment:
      LOG_LEVEL: info

      # minimal needed for this app
      CONTAINERS: 1
      IMAGES: 1
      INFO: 1
      VERSION: 1

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  transcoder:
    build: ./transcoder
    container_name: batch-transcoder
    restart: "no"
    environment:
      DOCKER_HOST: tcp://dockerproxy:2375
      INPUT_DIR: /input
      OUTPUT_DIR: /output
      JOBS: 2
      FFMPEG_IMAGE: lscr.io/linuxserver/ffmpeg:latest
    volumes:
      - /your/source:/input:ro
      - /your/source/output:/output:rw
    depends_on:
      - dockerproxy